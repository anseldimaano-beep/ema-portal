
services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ema_emits_db
      POSTGRES_USER: ema_emits_user
      POSTGRES_PASSWORD: ema_emits_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ema_emits_user -d ema_emits_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  backend:
    build: .
    command: >
      sh -c "python backend/manage.py migrate &&
             python backend/manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgres://ema_emits_user:ema_emits_password@db:5432/ema_emits_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=http://localhost:3002,http://127.0.0.1:3002
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm start"
    volumes:
      - ./frontend:/app
    ports:
      - "3002:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8001/api
      - PORT=3000
    depends_on:
      - backend

volumes:
  postgres_data:
